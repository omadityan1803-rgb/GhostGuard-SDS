<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVerify — Sign In</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f4f6f9;--card:#fff;--border:#e2e6ea;--input-bg:#f8f9fb;--label:#6b7280;--text:#1a1d23;--sub:#9ca3af;--blue:#2563eb;--blue-h:#1d4ed8;--sh:0 1px 3px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.06);}
  body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}

  main{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
  .wrap{width:100%;max-width:440px;}
  .logo-block{text-align:center;margin-bottom:2rem;animation:fadeDown .5s ease both;}
  .logo-img-wrap{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;background:#fff;border:1px solid var(--border);border-radius:18px;margin-bottom:12px;box-shadow:var(--sh);overflow:hidden;}
  .logo-img-wrap img{width:52px;height:auto;object-fit:contain;}
  .org{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.4px;}
  .tag{font-size:13px;color:var(--sub);margin-top:3px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;box-shadow:var(--sh);animation:fadeUp .5s .1s ease both;}
  .card-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:4px;}
  .card-sub{font-size:13px;color:var(--sub);margin-bottom:1.75rem;}
  .fg{margin-bottom:1.1rem;}
  label{display:block;font-size:12px;font-weight:500;color:var(--label);margin-bottom:6px;letter-spacing:.02em;}
  .iw{position:relative;}
  .ii{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#c4c9d4;pointer-events:none;display:flex;}
  input[type=email],input[type=password]{width:100%;height:42px;background:var(--input-bg);border:1px solid var(--border);border-radius:9px;padding:0 12px 0 38px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;}
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff;}
  input::placeholder{color:#c4c9d4;}
  .opts{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
  .cb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--label);cursor:pointer;}
  .cb input{width:15px;height:15px;padding:0;accent-color:var(--blue);}
  .forgot{font-size:13px;color:var(--blue);cursor:pointer;}
  .btn{width:100%;height:44px;background:var(--blue);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 2px 8px rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .1s;}
  .btn:hover{background:var(--blue-h);}
  .btn:active{transform:scale(.98);}
  .btn.loading{pointer-events:none;opacity:.7;}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
  .btn.loading .spinner{display:block;}
  .btn.loading .bt{display:none;}
  .div{display:flex;align-items:center;gap:12px;margin:1.5rem 0;}
  .div::before,.div::after{content:'';flex:1;height:1px;background:var(--border);}
  .div span{font-size:11px;color:var(--sub);white-space:nowrap;}
  .sso{display:flex;gap:8px;}
  .sbtn{flex:1;height:38px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:500;font-family:inherit;color:var(--label);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:border-color .15s,background .15s;}
  .sbtn:hover{border-color:#c9d0db;background:#fff;}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
// ════════════════════════════════════════════════════════════════
//  PASSIVESHIELD — PAGE 1 (Login)
//  Signal collection + localStorage broadcast
//  Cross-window mechanism: localStorage 'storage' event fires in
//  ALL other windows of the same origin when we write here.
// ════════════════════════════════════════════════════════════════

const CHANNEL = 'ps_signal'; // localStorage key

const S = {
  mouseSpeeds: [], mouseAccels: [], mousePositions: [],
  clickTimes:  [], keyTimes:    [], scrollDeltas:   [],
  interactions: 0, lastMouse: null, startTime: performance.now(),
};

// ── Math helpers ──────────────────────────────────────────────
const mean = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : 0;
const std  = a => {
  if (a.length < 2) return 0;
  const m = mean(a);
  return Math.sqrt(a.reduce((x,y)=>x+(y-m)**2, 0) / a.length);
};

function pathLinearity(pts) {
  if (pts.length < 3) return 0.5;
  const dx = pts[pts.length-1].x - pts[0].x;
  const dy = pts[pts.length-1].y - pts[0].y;
  const straight = Math.sqrt(dx*dx + dy*dy) + 0.001;
  let path = 0;
  for (let i=1; i<pts.length; i++) {
    const ddx = pts[i].x - pts[i-1].x, ddy = pts[i].y - pts[i-1].y;
    path += Math.sqrt(ddx*ddx + ddy*ddy);
  }
  return Math.min(straight / path, 1);
}

function sessionEntropy() {
  const all = [...S.mouseSpeeds, ...S.scrollDeltas];
  if (all.length < 5) return 0.5;
  const buckets = new Array(8).fill(0);
  const mx = Math.max(...all) || 1;
  all.forEach(v => buckets[Math.min(7, Math.floor(v/mx*8))]++);
  let ent = 0;
  buckets.forEach(b => { if (b>0) { const p=b/all.length; ent -= p*Math.log2(p); }});
  return Math.min(ent/3, 1);
}

function typingIntervals() {
  const r = [];
  for (let i=1; i<S.keyTimes.length; i++) r.push(S.keyTimes[i] - S.keyTimes[i-1]);
  return r;
}
function clickIntervals() {
  const r = [];
  for (let i=1; i<S.clickTimes.length; i++) r.push(S.clickTimes[i] - S.clickTimes[i-1]);
  return r;
}

// ── XGBoost-lite scorer ───────────────────────────────────────
// SCORING PHILOSOPHY:
//   Fast human typing:  CoV > 0.38 (variable rhythm even when fast)
//   Bot typing 20ms:    CoV < 0.05 (perfectly uniform, zero variation)
//   Fast human mouse:   burstCv > 0.20 (speed fluctuates between points)
//   Bot mouse straight: burstCv < 0.03 (constant velocity, zero jitter)
function xgboost(f) {
  let s = 0;
  // T1: Overall mouse speed CoV
  s += f.cv > 0.35 ? 0.14 : f.cv > 0.15 ? 0.06 : -0.12;
  // T2: BURST CoV — last 5 speeds. Reacts within 5 mouse events (~80ms).
  s += f.burstCv > 0.25 ? 0.20 : f.burstCv > 0.10 ? 0.08 :
       f.burstCv > 0.02 ? -0.20 : f.burstCv >= 0    ? -0.32 : 0;
  // T3: Acceleration jitter
  s += f.accelVar > 80 ? 0.14 : f.accelVar > 20 ? 0.06 : -0.12;
  // T4: Typing mean latency
  s += f.typingMean > 100 ? 0.08 : f.typingMean > 50 ? 0.04 :
       f.typingMean > 0   ? -0.06 : 0;
  // T5: Typing std (absolute variance)
  s += f.typingStd > 60 ? 0.10 : f.typingStd > 20 ? 0.05 :
       f.typingStd > 5  ? -0.12 : f.typingStd > 0 ? -0.22 : 0;
  // T6: Typing CoV — HIGHEST WEIGHT feature (+/-0.34)
  //   Fast human (70ms avg, 30ms std): CoV=0.43 → HUMAN
  //   Hold backspace (25ms avg, 2ms std): CoV=0.08 → BOT
  s += f.typingCoV > 0.38 ? 0.34 : f.typingCoV > 0.22 ? 0.16 :
       f.typingCoV > 0.10 ? -0.18 : f.typingCoV > 0    ? -0.34 : 0;
  // T7: Click interval std
  s += f.clickStd > 80 ? 0.08 : f.clickStd > 25 ? 0.04 : -0.08;
  // T8: Path linearity
  s += f.linearity < 0.60 ? 0.12 : f.linearity < 0.85 ? 0.04 : -0.14;
  // T9: Session entropy
  s += f.entropy > 0.55 ? 0.08 : f.entropy > 0.30 ? 0.03 : -0.07;
  return Math.max(0.02, Math.min(0.98, 0.5 + s));
}

// ── Build features from a slice ──────────────────────────────
function buildFeatures(speeds, accels, positions, keyTimesSlice, scrollsSlice, clickTimesSlice) {
  const ti = [];
  for (let i=1; i<keyTimesSlice.length; i++) ti.push(keyTimesSlice[i]-keyTimesSlice[i-1]);
  const ci = [];
  for (let i=1; i<clickTimesSlice.length; i++) ci.push(clickTimesSlice[i]-clickTimesSlice[i-1]);
  const tMean = mean(ti), tStd = std(ti);
  const typingCoV = (ti.length >= 3 && tMean > 0) ? tStd / tMean : 0;
  // burstCv: CoV of last 5 speeds — detects constant-velocity mouse
  const burst5 = speeds.slice(-5);
  const bm = mean(burst5);
  const burstCv = (burst5.length >= 3 && bm > 0) ? std(burst5) / bm : -1;
  const all = [...speeds, ...scrollsSlice];
  let ent = 0;
  if (all.length >= 5) {
    const buckets = new Array(8).fill(0), mx = Math.max(...all)||1;
    all.forEach(v => buckets[Math.min(7, Math.floor(v/mx*8))]++);
    buckets.forEach(b => { if(b>0){const p=b/all.length; ent-=p*Math.log2(p);} });
    ent = Math.min(ent/3, 1);
  } else { ent = 0.5; }
  return {
    cv: std(speeds)/(mean(speeds)||1), burstCv,
    speedMean: mean(speeds), accelVar: std(accels),
    clickStd: std(ci), typingMean: tMean, typingStd: tStd,
    typingCoV, scrollVar: std(scrollsSlice), entropy: ent,
    linearity: pathLinearity(positions),
  };
}

// ── EMA smoother state ───────────────────────────────────────
// EMA = Exponential Moving Average. Instead of fighting between
// two raw window scores that cause toggling, we track a single
// smooth score that reacts quickly (α=0.35) but doesn't oscillate.
//
// α=0.35 means: new_ema = 0.35×raw_score + 0.65×prev_ema
// • Score drops from 98→60 in ~5 updates (~400ms) on bot signal
// • Score recovers from 30→70 in ~5 updates on human signal
// • No toggling because EMA cannot jump more than ±35% per update
let emaScore = 0.5;       // starts neutral
let emaInitialized = false;

function broadcast() {
  if (S.interactions < 3) return;

  // Single reactive window — last 10 mouse pts, 6 keystrokes
  // Small enough to react within 3-4 events, big enough for std() to be meaningful
  const fLive = buildFeatures(
    S.mouseSpeeds.slice(-10), S.mouseAccels.slice(-10),
    S.mousePositions.slice(-10), S.keyTimes.slice(-6),
    S.scrollDeltas.slice(-6),   S.clickTimes.slice(-4)
  );
  // Separate history window for display table only
  const fHist = buildFeatures(
    S.mouseSpeeds.slice(-50), S.mouseAccels.slice(-50),
    S.mousePositions.slice(-40), S.keyTimes.slice(-40),
    S.scrollDeltas.slice(-30), S.clickTimes.slice(-10)
  );

  // Raw score from the live window
  let rawScore = xgboost(fLive);

  // Hard caps: bot-like signals force raw score down BEFORE EMA smoothing
  // This means the cap effect propagates through EMA smoothly rather than toggling
  if (fLive.burstCv >= 0 && fLive.burstCv < 0.03)   rawScore = Math.min(rawScore, 0.42);
  if (fLive.typingCoV > 0 && fLive.typingCoV < 0.08) rawScore = Math.min(rawScore, 0.38);

  // EMA update: α=0.35 → reactive but smooth, no toggling
  const alpha = 0.35;
  if (!emaInitialized) { emaScore = rawScore; emaInitialized = true; }
  else { emaScore = alpha * rawScore + (1 - alpha) * emaScore; }

  const prob = Math.max(0.02, Math.min(0.98, emaScore));
  const pHist = xgboost(fHist);

  localStorage.setItem(CHANNEL, JSON.stringify({
    ts: Date.now(),
    features: fHist, featuresRecent: fLive,
    probHist: pHist, probRecent: rawScore, prob,
    raw: {
      mouseSpeeds: S.mouseSpeeds.slice(-50), mouseAccels: S.mouseAccels.slice(-50),
      mousePositions: S.mousePositions.slice(-40), keyTimes: S.keyTimes.slice(-40),
      scrollDeltas: S.scrollDeltas.slice(-30), clickTimes: S.clickTimes.slice(-10),
      recentSpeeds: S.mouseSpeeds.slice(-10), recentPositions: S.mousePositions.slice(-10),
      recentKeyTimes: S.keyTimes.slice(-6),
    },
    meta: { interactions: S.interactions, elapsed: performance.now()-S.startTime },
    context: {
      ...CTX, time: getTimeContext(),
      userAgent: navigator.userAgent, platform: navigator.platform,
      language: navigator.language, screenW: screen.width, screenH: screen.height,
      devicePixelRatio: window.devicePixelRatio||1,
      cookiesEnabled: navigator.cookieEnabled, touchPoints: navigator.maxTouchPoints||0,
    }
  }));
}


// ── Context: location + time of day (collected once on load) ─
const CTX = {
  city: null, country: null, countryCode: null,
  lat: null, lon: null, timezone: null,
  ip: null, isp: null,
  timeOfDay: null, hour: null, isWeekend: null,
};

// Fetch geo/IP context via free API (no key needed)
fetch('https://ipapi.co/json/')
  .then(r => r.json())
  .then(d => {
    CTX.city        = d.city        || null;
    CTX.country     = d.country_name|| null;
    CTX.countryCode = d.country_code|| null;
    CTX.lat         = d.latitude    || null;
    CTX.lon         = d.longitude   || null;
    CTX.timezone    = d.timezone    || null;
    CTX.ip          = d.ip          || null;
    CTX.isp         = d.org         || null;
  }).catch(() => {}); // silent fail — no hard dependency

// Time-of-day context (computed from local time)
function getTimeContext() {
  const now   = new Date();
  const hour  = now.getHours();
  const day   = now.getDay(); // 0=Sun,6=Sat
  let slot;
  if      (hour >= 5  && hour < 9 )  slot = 'early_morning';
  else if (hour >= 9  && hour < 12)  slot = 'morning';
  else if (hour >= 12 && hour < 14)  slot = 'midday';
  else if (hour >= 14 && hour < 18)  slot = 'afternoon';
  else if (hour >= 18 && hour < 22)  slot = 'evening';
  else                                slot = 'night';
  return {
    hour, slot,
    isWeekend:  day === 0 || day === 6,
    dayName:    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][day],
    localTime:  now.toLocaleTimeString(),
    utcOffset:  -(now.getTimezoneOffset() / 60),
    // Bot risk: logins at night / weekends from unusual timezones are suspicious
    riskSignal: (hour < 5 || hour >= 23) ? 'high' : (hour < 8 || hour >= 20) ? 'medium' : 'low',
  };
}

let broadcastTimer = null;
function scheduleBroadcast() {
  if (broadcastTimer) return;
  broadcastTimer = setTimeout(() => { broadcastTimer = null; broadcast(); }, 80);
}

// (local UI panel removed — all data shown in page2 window)

// ── Mouse ─────────────────────────────────────────────────────
document.addEventListener('mousemove', e => {
  const x = e.clientX, y = e.clientY, t = performance.now();
  if (S.lastMouse) {
    const dx=x-S.lastMouse.x, dy=y-S.lastMouse.y, dt=t-S.lastMouse.t;
    if (dt > 0 && dt < 500) {
      const spd = Math.sqrt(dx*dx+dy*dy)/dt*1000;
      if (S.mouseSpeeds.length) S.mouseAccels.push(Math.abs(spd - S.mouseSpeeds[S.mouseSpeeds.length-1])/dt*1000);
      S.mouseSpeeds.push(spd);
      if (S.mouseSpeeds.length > 80) S.mouseSpeeds.shift();
      if (S.mouseAccels.length > 80) S.mouseAccels.shift();
    }
  }
  S.mousePositions.push({x, y, t});
  if (S.mousePositions.length > 60) S.mousePositions.shift();
  S.lastMouse = {x, y, t};
  S.interactions++;
  scheduleBroadcast();
});

document.addEventListener('click', e => {
  S.clickTimes.push(performance.now());
  if (S.clickTimes.length > 20) S.clickTimes.shift();
  S.interactions++;
  scheduleBroadcast();
});

document.addEventListener('wheel', e => {
  S.scrollDeltas.push(Math.abs(e.deltaY));
  if (S.scrollDeltas.length > 40) S.scrollDeltas.shift();
  S.interactions++;
  scheduleBroadcast();
}, {passive: true});

document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('keydown', () => {
    S.keyTimes.push(performance.now());
    if (S.keyTimes.length > 60) S.keyTimes.shift();
    S.interactions++;
    scheduleBroadcast();
  });
});

// ── Login submit ──────────────────────────────────────────────
function handleLogin(e) {
  e.preventDefault();
  document.getElementById('loginBtn').classList.add('loading');
  // Mark as logged in so page2 can show success state
  broadcast();
  localStorage.setItem('ps_loggedin', JSON.stringify({
    email: document.getElementById('email').value || 'user@company.com',
    ts: Date.now()
  }));
  // Stay on page — demo mode. In production would redirect.
  setTimeout(() => {
    document.getElementById('loginBtn').classList.remove('loading');
    document.querySelector('.bt').textContent = '✓ Signed in — detection running on page 2';
    document.getElementById('loginBtn').style.background = '#16a34a';
  }, 1000);
}
